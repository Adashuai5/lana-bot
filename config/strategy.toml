# Lana-bot strategy parameters
# Edit freely; reloaded each cycle.

live_trading = false            # MUST stay false until dry-run validation passes
exchange = "binance"            # "binance" | "gate"
initial_capital_usdt = 50
# 仓位大小与止损均为百分比逻辑，每个 cycle 从当前净值动态派生。
# 净值 = initial_capital_usdt + journal 中所有 close 事件的 net_pnl_usdt 之和（仅已实现）。
# 止损口径：按"未实现PnL(USDT)"触发，PnL基于名义价值(notional)计算。
# 示例（50U净值时）：position_size = 50 × 40% = 20U；stop = 20 × 50% = 10U；notional = 200U。

# 仓位大小：equity × position_size_pct（下限 position_size_min_usdt，上限 position_size_max_usdt）
position_size_pct = 0.40
position_size_min_usdt = 5.0
position_size_max_usdt = 200.0

# 单仓止损：position_size_usdt × max_stop_loss_pct_of_position
max_stop_loss_pct_of_position = 0.50

max_concurrent_positions = 2
leverage = 10
cycle_minutes = 30

[filters]
min_24h_volume_usdt = 5_000_000
min_24h_change_pct = 10
min_oi_change_1h_pct = 5
top_n_candidates = 20
min_pullback_from_high_pct = 4.0  # skip if price within 3% of 5h high (avoid chasing peaks)
min_short_gain_pct = 15.0         # secondary stage1 path: accept if gain_from_24h_low >= 15% even when 24h net < 10%
max_oi_gap_bars_1h = 2            # max consecutive counter-direction bars in 1h OI window (was ratio 0.55)
max_oi_gap_bars_4h = 3            # max consecutive counter-direction bars in 4h OI window (was ratio 0.50)
fomo_gain_from_low_pct = 50.0    # FOMO路径：gain_from_low >= 此值时视为持续泵
fomo_atr_max_pct = 15.0          # FOMO路径：ATR < 此值说明波动收窄（趋势稳定）
fomo_oi_min_pct = 2.0            # FOMO路径：放宽OI门槛至此值（正常门槛5%）

[square]
enabled = true
top_n_trending = 20

[fast_scan]
surge_pct       = 15.0        # 触发阈值：24h涨幅 OR gain_from_low 超过此值视为异动
short_surge_pct = 15.0        # gain_from_low 专用阈值（可单独调低以更敏感地捕捉日内泵）
surge_vol_usdt  = 20_000_000  # 最低成交量门槛（20M USDT）

[short_filters]
enabled = true
min_squeeze_pct = 30.0          # price gain threshold to consider squeeze fade short
min_volume_usdt = 5_000_000
top_n = 5

[risk]
# Account-level circuit breakers. Evaluated pre-open in execute.py.
# Set any to 0 to disable that gate.
# 日亏上限和未实现回撤上限：均为当前净值的百分比，随净值自动缩放。
# 50U净值时：max_daily_loss = 50 × 60% = 30U；max_unrealized_drawdown = 50 × 40% = 20U（与旧值一致）。
max_daily_loss_pct = 0.60
max_unrealized_drawdown_pct = 0.40
max_sector_exposure_pct = 0      # 禁用：200U notional vs 50U capital 始终触发，真实保护来自止损
max_daily_opens = 12            # 24h 最多开仓次数
stop_loss_cooldown_min = 0      # 账户级SL冷却（禁用；单symbol级别见下方）
max_daily_sl_per_symbol = 2     # 单symbol：今日SL ≥ N 次 → 全天封禁
symbol_sl_cooldown_min = 90     # 单symbol：任意SL后冷却分钟数
atr_stop_multiplier = 1.5       # stop = 1.5 × ATR × notional；设为0则仅用固定止损
# ATR止损范围：相对于 position_size_usdt 的比例（50U净值时：8U-14U，与旧值一致）
atr_stop_min_pct_of_position = 0.40
atr_stop_max_pct_of_position = 0.70

[exit_rules]
risk_multiple_tp = 1.5
risk_multiple_tp_close_fraction = 0.5
# trailing_drawdown：触发止盈后，剩余仓位回撤超过此值则强制平仓。
# 相对于 position_size_usdt 的比例（50U净值时：20U × 15% = 3U，与旧值一致）。
trailing_drawdown_pct = 0.15
max_hold_seconds = 21600

[regime]
enabled = false
execute_gate_enabled = false
reduce_size_multiplier = 0.5

trend_lookback_bars_4h = 30
trend_drift_up_pct_4h = 0.02
trend_drift_down_pct_4h = 0.02

breadth_allow_min = 0.52
breadth_reduce_min = 0.45

vol_window_hours = 24
vol_history_hours = 336
vol_allow_quantile_max = 0.75
vol_reduce_quantile_max = 0.90
