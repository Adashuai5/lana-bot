# Lana-bot strategy parameters
# Edit freely; reloaded each cycle.

live_trading = false            # MUST stay false until dry-run validation passes
exchange = "binance"            # "binance" | "gate"
initial_capital_usdt = 50
# Stop-loss口径（唯一定义）：按"未实现PnL(USDT)"触发，PnL基于名义价值(notional)计算。
# 触发条件：unrealized_pnl_usdt <= -max_stop_loss_per_position_usdt
# 示例：position_size_usdt=20, leverage=10 -> notional=200U；若 max_stop_loss_per_position_usdt=10，
# 则等价于保证金亏损50%（10/20）或名义价值回撤5%（10/200）。
max_stop_loss_per_position_usdt = 10
max_concurrent_positions = 2
position_size_usdt = 20         # collateral per position (notional = 20 * leverage)
leverage = 10
cycle_minutes = 30

[filters]
min_24h_volume_usdt = 5_000_000
min_24h_change_pct = 10
min_oi_change_1h_pct = 5
top_n_candidates = 20
min_pullback_from_high_pct = 3.0  # skip if price within 3% of 5h high (avoid chasing peaks)
min_short_gain_pct = 15.0         # secondary stage1 path: accept if gain_from_24h_low >= 15% even when 24h net < 10%
max_oi_gap_bars_1h = 2            # max consecutive counter-direction bars in 1h OI window (was ratio 0.55)
max_oi_gap_bars_4h = 3            # max consecutive counter-direction bars in 4h OI window (was ratio 0.50)

[square]
enabled = true
top_n_trending = 20

[fast_scan]
surge_pct       = 15.0        # 触发阈值：24h涨幅 OR gain_from_low 超过此值视为异动
short_surge_pct = 15.0        # gain_from_low 专用阈值（可单独调低以更敏感地捕捉日内泵）
surge_vol_usdt  = 20_000_000  # 最低成交量门槛（20M USDT）

[short_filters]
enabled = true
min_squeeze_pct = 30.0          # price gain threshold to consider squeeze fade short
min_volume_usdt = 5_000_000
top_n = 5

[risk]
# Account-level circuit breakers. Evaluated pre-open in execute.py.
# Set any to 0 to disable that gate.
max_daily_loss_usdt = 30        # halt opens once 24h realized PnL ≤ -30U (~30% of capital)
max_unrealized_drawdown_usdt = 20 # halt opens once combined unrealized PnL ≤ -20U
max_sector_exposure_pct = 0      # disabled: 200U notional vs 50U capital always triggers; stop-loss is the real guard
max_daily_opens = 12            # cap opens per 24h (~cycle cadence * 3 candidates)
stop_loss_cooldown_min = 0      # account-level SL cooldown (disabled; per-symbol below)
max_daily_sl_per_symbol = 2     # per-symbol: ≥ N SLs today → block all-day
symbol_sl_cooldown_min = 90     # per-symbol: cooldown minutes after any SL
atr_stop_multiplier = 1.5       # stop = 1.5 × ATR × notional; set to 0 to use fixed stop only
atr_stop_min_usdt = 8           # floor: never tighter than 8U (40% of 20U margin)
atr_stop_max_usdt = 14          # ceiling: never wider than 14U (70% of 20U margin)

[exit_rules]
risk_multiple_tp = 1.5
risk_multiple_tp_close_fraction = 0.5
trailing_drawdown_usdt = 3
max_hold_seconds = 21600

[regime]
enabled = false
execute_gate_enabled = false
reduce_size_multiplier = 0.5

trend_lookback_bars_4h = 30
trend_drift_up_pct_4h = 0.02
trend_drift_down_pct_4h = 0.02

breadth_allow_min = 0.52
breadth_reduce_min = 0.45

vol_window_hours = 24
vol_history_hours = 336
vol_allow_quantile_max = 0.75
vol_reduce_quantile_max = 0.90
