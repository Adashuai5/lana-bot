<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lana-bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #0a0a0a; color: #d0d0d0; }

/* ── Header ── */
header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; background: #111; border-bottom: 1px solid #222;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 15px; color: #fff; letter-spacing: 1px; }
.badge { padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
.badge-run  { background: #0d2e0d; color: #4caf50; border: 1px solid #2e5e2e; }
.badge-stop { background: #2e0d0d; color: #f44336; border: 1px solid #5e2e2e; }
.btn { padding: 4px 12px; border: 1px solid #333; background: #1a1a1a; color: #bbb;
       cursor: pointer; border-radius: 3px; font-size: 12px; font-family: monospace; }
.btn:hover { background: #252525; color: #fff; }
.btn-danger { border-color: #5e2e2e; color: #f44336; }
.btn-danger:hover { background: #2e0d0d; }
.btn-primary { border-color: #2e5e2e; color: #4caf50; }
.btn-primary:hover { background: #0d2e0d; }
.btn-sm { padding: 2px 8px; font-size: 11px; }
#refresh-info { margin-left: auto; color: #444; font-size: 11px; }
#countdown { color: #555; font-size: 11px; margin-left: 8px; }

/* ── Layout ── */
main { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.col-full  { grid-column: 1 / -1; }
.col-left  { grid-column: 1; }
.col-right { grid-column: 2; }

/* ── Card ── */
.card { background: #111; border: 1px solid #1e1e1e; border-radius: 6px; overflow: hidden; }
.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-bottom: 1px solid #1e1e1e;
}
.card-header h2 { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; flex: 1; }
.card-header .meta { font-size: 11px; color: #444; }
.stale { color: #b26200 !important; }

/* ── Summary strip ── */
#summary-strip {
  display: flex; gap: 1px; background: #1a1a1a;
  border-bottom: 1px solid #222;
}
.stat-box { flex: 1; padding: 10px 16px; background: #111; }
.stat-box .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.stat-box .value { font-size: 20px; font-weight: bold; margin-top: 2px; }
.stat-box .sub   { font-size: 11px; color: #555; margin-top: 1px; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; }
th { padding: 6px 12px; text-align: left; color: #555; font-weight: normal;
     border-bottom: 1px solid #1a1a1a; white-space: nowrap; font-size: 11px; }
td { padding: 6px 12px; border-bottom: 1px solid #161616; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #161616; }
.sortable { cursor: pointer; user-select: none; }
.sortable:hover { color: #999; }
.sort-asc::after  { content: ' ▲'; font-size: 9px; }
.sort-desc::after { content: ' ▼'; font-size: 9px; }

/* ── PnL bar ── */
.pnl-cell { min-width: 120px; }
.pnl-bar-wrap { display: flex; align-items: center; gap: 6px; }
.pnl-bar-bg { flex: 1; height: 4px; background: #1e1e1e; border-radius: 2px; min-width: 50px; }
.pnl-bar-fill { height: 4px; border-radius: 2px; transition: width .3s; }
.pnl-bar-pos { background: #4caf50; }
.pnl-bar-neg { background: #f44336; }

/* ── Colors ── */
.pos  { color: #4caf50; }
.neg  { color: #f44336; }
.dim  { color: #555; }
.warn { color: #ffd54f; }

/* ── Tags ── */
.tag { padding: 1px 6px; border-radius: 2px; font-size: 11px; }
.tag-open          { background: #0d2e0d; color: #4caf50; }
.tag-close         { background: #2e0d0d; color: #f44336; }
.tag-decision      { background: #0d1e2e; color: #64b5f6; }
.tag-skip          { background: #2a2a0d; color: #ffd54f; }
.tag-error         { background: #2e0d0d; color: #ef5350; }
.tag-exit_triggered{ background: #1e0d2e; color: #ce93d8; }
.tag-stop_loss_triggered { background: #3e0d0d; color: #ff5252; }

/* ── Filter bar ── */
.filter-bar { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; }
.filter-btn { padding: 2px 8px; border: 1px solid #2a2a2a; background: #151515;
              color: #666; border-radius: 10px; cursor: pointer; font-size: 11px; font-family: monospace; }
.filter-btn.active { background: #1e2e1e; border-color: #3e5e3e; color: #8bc34a; }
.filter-btn:hover { border-color: #444; color: #aaa; }

/* ── Progress bar (SL distance) ── */
.sl-bar-wrap { display: flex; align-items: center; gap: 6px; min-width: 100px; }
.sl-bar-bg   { flex: 1; height: 4px; background: #1e1e1e; border-radius: 2px; }
.sl-bar-fill { height: 4px; border-radius: 2px; background: #4caf50; transition: width .3s; }

/* ── Pie chart ── */
#exit-chart-wrap { padding: 16px; display: flex; gap: 24px; align-items: center; }
#exit-canvas     { flex-shrink: 0; }
#exit-legend     { display: flex; flex-direction: column; gap: 8px; }
.legend-item     { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot      { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── PnL sparkline ── */
#pnl-chart-wrap { padding: 12px 16px; }

/* ── Log ── */
#log-output { height: 220px; overflow-y: auto; white-space: pre; font-size: 11px;
              color: #5a8a5a; line-height: 1.5; padding: 10px 14px; }

/* ── Empty / loading ── */
.empty { padding: 20px; color: #333; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>lana-bot</h1>
  <span id="status-badge" class="badge badge-stop">…</span>
  <button class="btn btn-primary" onclick="botAction('start')">启动</button>
  <button class="btn btn-danger"  onclick="botAction('stop')">停止</button>
  <button class="btn" onclick="triggerCollect()">采集</button>
  <button class="btn" onclick="triggerCycle()">决策</button>
  <span id="refresh-info">加载中…</span>
  <span id="countdown"></span>
</header>

<!-- summary strip -->
<div id="summary-strip">
  <div class="stat-box"><div class="label">持仓</div><div class="value" id="s-count">-</div><div class="sub">/ 3 上限</div></div>
  <div class="stat-box"><div class="label">未实现PnL</div><div class="value" id="s-upnl">-</div><div class="sub" id="s-upnl-sub"></div></div>
  <div class="stat-box"><div class="label">今日已实现</div><div class="value" id="s-rpnl">-</div><div class="sub" id="s-rpnl-sub"></div></div>
  <div class="stat-box"><div class="label">候选标的</div><div class="value" id="s-cands">-</div><div class="sub" id="s-cands-age"></div></div>
</div>

<main>
  <!-- 持仓 (full width) -->
  <section class="card col-full">
    <div class="card-header">
      <h2>持仓</h2>
    </div>
    <div id="positions-container"><p class="empty">加载中…</p></div>
  </section>

  <!-- 候选信号 (full width) -->
  <section class="card col-full">
    <div class="card-header">
      <h2>候选信号</h2>
      <span class="meta" id="candidates-ts"></span>
    </div>
    <div id="candidates-container"><p class="empty">加载中…</p></div>
  </section>

  <!-- 日志 (left) -->
  <section class="card col-left">
    <div class="card-header"><h2>决策日志（最近20条）</h2></div>
    <div class="filter-bar" id="journal-filters"></div>
    <div id="journal-container"><p class="empty">加载中…</p></div>
  </section>

  <!-- 出场统计 (right) -->
  <section class="card col-right">
    <div class="card-header"><h2>出场类型统计</h2></div>
    <div id="exit-chart-wrap">
      <canvas id="exit-canvas" width="120" height="120"></canvas>
      <div id="exit-legend"></div>
    </div>
  </section>

  <!-- PnL 历史折线 (full width) -->
  <section class="card col-full">
    <div class="card-header"><h2>已实现 PnL 历史</h2></div>
    <div id="pnl-chart-wrap"><canvas id="pnl-canvas" width="900" height="120"></canvas></div>
  </section>

  <!-- 实时日志 (full width) -->
  <section class="card col-full">
    <div class="card-header">
      <h2>实时日志 (cycle.log)</h2>
      <button class="btn btn-sm" onclick="clearLog()">清空</button>
    </div>
    <pre id="log-output"></pre>
  </section>
</main>

<script>
/* ─── helpers ─── */
function fmtTime(ms) {
  if (!ms) return '-';
  return new Date(ms).toLocaleString('zh-CN', {hour12: false});
}
function fmtAge(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  return Math.floor(s / 3600) + 'h' + Math.floor((s % 3600) / 60) + 'm';
}
function fmtVol(v) {
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  return v.toFixed(0);
}
function pnlClass(v) { return v === null ? '' : v >= 0 ? 'pos' : 'neg'; }
function pnlSign(v)  { return v > 0 ? '+' : ''; }

/* ─── sorting state for candidates ─── */
let candSort = { key: 'score', dir: -1 };
let candData = [];

/* ─── journal filter state ─── */
let journalFilter = 'all';
let journalData   = [];
const EVENT_TYPES = ['all', 'decision', 'open', 'close', 'skip', 'error'];

/* ─── countdown ─── */
let nextRefresh = Date.now() + 30000;
setInterval(() => {
  const s = Math.max(0, Math.ceil((nextRefresh - Date.now()) / 1000));
  document.getElementById('countdown').textContent = `刷新倒计时 ${s}s`;
}, 1000);

/* ─── status ─── */
async function loadStatus() {
  const r = await fetch('/api/status').then(r => r.json());
  const b = document.getElementById('status-badge');
  b.textContent = r.running ? '运行中' : '已停止';
  b.className = 'badge ' + (r.running ? 'badge-run' : 'badge-stop');
}

/* ─── positions ─── */
async function loadPositions() {
  const data = await fetch('/api/positions').then(r => r.json());
  const el = document.getElementById('positions-container');

  // summary
  document.getElementById('s-count').textContent = data.length;
  document.getElementById('s-count').className = data.length >= 3 ? 'value warn' : 'value pos';
  const totalPnl = data.reduce((a, p) => a + (p.unrealized_pnl_usdt ?? 0), 0);
  const upnlEl = document.getElementById('s-upnl');
  upnlEl.textContent = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2) + 'U';
  upnlEl.className = 'value ' + pnlClass(totalPnl);
  document.getElementById('s-upnl-sub').textContent = data.length ? `${data.length} 个持仓合计` : '无持仓';

  if (!data.length) { el.innerHTML = '<p class="empty">无持仓</p>'; return; }

  const MAX_SL = 10; // from strategy
  el.innerHTML = `<table>
    <tr>
      <th>Symbol</th><th>入场价</th><th>Mark价</th>
      <th>保证金</th><th>杠杆</th>
      <th>未实现PnL</th><th>涨幅(杠杆后)</th>
      <th>止损距离</th><th>模式</th><th>持仓时长</th><th>操作</th>
    </tr>
    ${data.map(p => {
      const pnl     = p.unrealized_pnl_usdt;
      const pnlAbs  = Math.abs(pnl ?? 0);
      const barPct  = pnl !== null ? Math.min(100, (pnlAbs / MAX_SL) * 100) : 0;
      const slPct   = pnl !== null ? Math.min(100, ((MAX_SL + pnl) / MAX_SL) * 100) : 100;
      return `<tr>
        <td><b>${p.symbol}</b></td>
        <td class="dim">${p.entry_price}</td>
        <td>${p.mark_price ?? '-'}</td>
        <td class="dim">${p.size_usdt}U</td>
        <td class="dim">${p.leverage}x</td>
        <td class="pnl-cell">
          <div class="pnl-bar-wrap">
            <span class="${pnlClass(pnl)}">${pnl !== null ? pnlSign(pnl) + pnl.toFixed(2) + 'U' : '-'}</span>
            <div class="pnl-bar-bg"><div class="pnl-bar-fill ${pnl >= 0 ? 'pnl-bar-pos' : 'pnl-bar-neg'}" style="width:${barPct}%"></div></div>
          </div>
        </td>
        <td class="${pnlClass(p.pnl_pct)}">${p.pnl_pct !== null ? pnlSign(p.pnl_pct) + p.pnl_pct.toFixed(1) + '%' : '-'}</td>
        <td>
          <div class="sl-bar-wrap">
            <div class="sl-bar-bg"><div class="sl-bar-fill" style="width:${slPct}%"></div></div>
            <span class="dim" style="font-size:10px">${pnl !== null ? (MAX_SL + pnl).toFixed(2) + 'U' : '-'}</span>
          </div>
        </td>
        <td class="dim">${p.mode}</td>
        <td class="dim">${fmtAge(p.entry_ts_ms)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="closePosition('${p.symbol}')">平仓</button></td>
      </tr>`;
    }).join('')}
  </table>`;
}

/* ─── candidates ─── */
async function loadCandidates() {
  const data = await fetch('/api/candidates').then(r => r.json());
  candData = data.candidates ?? [];
  const tsEl = document.getElementById('candidates-ts');
  const s_cands = document.getElementById('s-cands');
  const s_age   = document.getElementById('s-cands-age');
  s_cands.textContent = candData.length;

  if (data.generated_at_ms) {
    const age = Date.now() - data.generated_at_ms;
    const stale = age > 10 * 60 * 1000;
    tsEl.textContent = fmtTime(data.generated_at_ms) + ' (' + fmtAge(data.generated_at_ms) + ' 前)';
    tsEl.className = stale ? 'meta stale' : 'meta';
    s_age.textContent = fmtAge(data.generated_at_ms) + ' 前';
    s_age.className = stale ? 'sub stale' : 'sub';
  }
  renderCandidates();
}

function renderCandidates() {
  const el = document.getElementById('candidates-container');
  if (!candData.length) { el.innerHTML = '<p class="empty">无数据</p>'; return; }

  // get held symbols
  const heldSymbols = new Set(
    Array.from(document.querySelectorAll('#positions-container td:first-child b'))
         .map(b => b.textContent)
  );

  const sorted = [...candData].sort((a, b) =>
    candSort.dir * ((b[candSort.key] ?? 0) - (a[candSort.key] ?? 0))
  );

  function thSort(key, label) {
    const cls = candSort.key === key ? (candSort.dir === -1 ? 'sort-desc' : 'sort-asc') : '';
    return `<th class="sortable ${cls}" onclick="sortCands('${key}')">${label}</th>`;
  }

  el.innerHTML = `<table>
    <tr>
      <th>#</th>
      ${thSort('symbol', 'Symbol')}
      ${thSort('last_price', '价格')}
      ${thSort('price_change_pct', '24h涨幅')}
      ${thSort('quote_volume_usdt', '成交量')}
      ${thSort('oi_change_1h_pct', 'OI变化1h')}
      ${thSort('score', '评分')}
      <th>提及</th>
    </tr>
    ${sorted.map((c, i) => {
      const held = heldSymbols.has(c.symbol);
      const rowStyle = held ? 'background:#0d1e0d;' : '';
      return `<tr style="${rowStyle}">
        <td class="dim">${i + 1}</td>
        <td>${c.symbol}${held ? ' <span style="color:#4caf50;font-size:10px">●持仓</span>' : ''}</td>
        <td class="dim">${c.last_price}</td>
        <td class="${c.price_change_pct >= 0 ? 'pos' : 'neg'}">${pnlSign(c.price_change_pct)}${c.price_change_pct.toFixed(1)}%</td>
        <td class="dim">${fmtVol(c.quote_volume_usdt)}</td>
        <td class="${c.oi_change_1h_pct >= 0 ? 'pos' : 'neg'}">${pnlSign(c.oi_change_1h_pct)}${c.oi_change_1h_pct.toFixed(1)}%</td>
        <td><b>${c.score.toFixed(1)}</b></td>
        <td class="dim">${c.square_mentions || 0}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

function sortCands(key) {
  if (candSort.key === key) candSort.dir *= -1;
  else { candSort.key = key; candSort.dir = -1; }
  renderCandidates();
}

/* ─── journal ─── */
async function loadJournal() {
  journalData = await fetch('/api/journal').then(r => r.json());
  renderJournalFilters();
  renderJournal();
}

function renderJournalFilters() {
  const el = document.getElementById('journal-filters');
  el.innerHTML = EVENT_TYPES.map(t => `
    <button class="filter-btn ${journalFilter === t ? 'active' : ''}" onclick="setJournalFilter('${t}')">
      ${t === 'all' ? '全部' : t}
    </button>`).join('');
}

function setJournalFilter(t) {
  journalFilter = t;
  renderJournalFilters();
  renderJournal();
}

function renderJournal() {
  const el = document.getElementById('journal-container');
  const filtered = journalFilter === 'all'
    ? journalData
    : journalData.filter(e => e.event === journalFilter);
  if (!filtered.length) { el.innerHTML = '<p class="empty">无记录</p>'; return; }
  el.innerHTML = `<table>
    <tr><th>时间</th><th>类型</th><th>Symbol</th><th>详情</th></tr>
    ${filtered.map(e => {
      const tag = `<span class="tag tag-${e.event}">${e.event}</span>`;
      let detail = '';
      if (e.event === 'decision') {
        const opens  = (e.open  || []).map(o => o.symbol).join(', ');
        const closes = (e.close || []).map(c => c.symbol).join(', ');
        detail = [opens && '开:' + opens, closes && '关:' + closes, e.skip_reason].filter(Boolean).join(' | ').slice(0, 120);
      } else if (e.event === 'open') {
        detail = `入场 ${e.price} × ${e.leverage}x = ${e.notional_usdt}U  手续费:${e.fee_usdt}U`;
      } else if (e.event === 'close') {
        const pnl = e.net_pnl_usdt;
        detail = `<span class="${pnl >= 0 ? 'pos' : 'neg'}">${pnlSign(pnl)}${pnl?.toFixed(2)}U</span> 出场 ${e.exit_price} [${e.exit_trigger || 'signal_decay'}]`;
      } else if (e.event === 'exit_triggered') {
        detail = `${e.exit_type || '-'} | ${(e.reason || '').slice(0, 72)}`;
      } else if (e.event === 'stop_loss_triggered') {
        detail = `<span class="neg">触发止损</span> mark=${e.mark} pnl=${e.pnl_usdt?.toFixed(2)}U`;
      } else if (e.event === 'skip') {
        detail = (e.reason || '').slice(0, 100);
      } else if (e.event === 'error') {
        detail = `<span class="neg">${(e.error || e.message || '').slice(0, 80)}</span>`;
      }
      return `<tr>
        <td class="dim">${fmtTime(e.ts_ms)}</td>
        <td>${tag}</td>
        <td>${e.symbol || ''}</td>
        <td style="color:#999">${detail}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

/* ─── exit stats pie chart ─── */
const PIE_COLORS = {
  hard_sl:      '#f44336',
  trailing_tp:  '#4caf50',
  time_stop:    '#ffd54f',
  signal_decay: '#64b5f6',
};
const PIE_LABELS = {
  hard_sl:      '硬止损',
  trailing_tp:  '追踪止盈',
  time_stop:    '时间止损',
  signal_decay: '信号衰减',
};

async function loadExitStats() {
  const data = await fetch('/api/exit-stats').then(r => r.json());
  const canvas = document.getElementById('exit-canvas');
  const legend = document.getElementById('exit-legend');
  const total  = data.total_closes;

  if (!total) {
    legend.innerHTML = '<span style="color:#333">暂无平仓记录</span>';
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 120, 120);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(60, 60, 50, 0, Math.PI * 2); ctx.stroke();
    return;
  }

  // draw pie
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 120, 120);
  const keys = ['hard_sl', 'trailing_tp', 'time_stop', 'signal_decay'];
  let startAngle = -Math.PI / 2;
  keys.forEach(k => {
    const frac = data[k] / total;
    if (!frac) return;
    const end = startAngle + frac * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(60, 60);
    ctx.arc(60, 60, 52, startAngle, end);
    ctx.closePath();
    ctx.fillStyle = PIE_COLORS[k];
    ctx.fill();
    startAngle = end;
  });
  // center hole
  ctx.beginPath(); ctx.arc(60, 60, 30, 0, Math.PI * 2);
  ctx.fillStyle = '#111'; ctx.fill();
  ctx.fillStyle = '#888'; ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, 60, 60);

  // legend
  legend.innerHTML = keys.filter(k => data[k]).map(k => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${PIE_COLORS[k]}"></div>
      <span style="color:#999">${PIE_LABELS[k]}</span>
      <span style="color:#666">${data[k]} (${(100 * data[k] / total).toFixed(0)}%)</span>
    </div>`).join('');
}

/* ─── realized PnL history sparkline ─── */
async function loadPnlChart() {
  const journal = await fetch('/api/journal?n=200').then(r => r.json());
  // collect close events sorted oldest first
  const closes = journal.filter(e => e.event === 'close')
                         .sort((a, b) => a.ts_ms - b.ts_ms);

  const canvas = document.getElementById('pnl-canvas');
  const W = canvas.parentElement.offsetWidth - 32 || 860;
  canvas.width = W;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, 120);

  if (!closes.length) {
    ctx.fillStyle = '#333'; ctx.font = '12px monospace';
    ctx.textAlign = 'center'; ctx.fillText('暂无平仓记录', W / 2, 60);

    // update summary
    document.getElementById('s-rpnl').textContent = '0.00U';
    document.getElementById('s-rpnl').className = 'value dim';
    return;
  }

  // cumulative PnL
  let cum = 0;
  const points = closes.map(c => { cum += c.net_pnl_usdt ?? 0; return cum; });
  const today_pnl = closes.filter(c => c.ts_ms >= Date.now() - 86400000)
                           .reduce((a, c) => a + (c.net_pnl_usdt ?? 0), 0);

  // update summary
  const rpnlEl = document.getElementById('s-rpnl');
  rpnlEl.textContent = pnlSign(today_pnl) + today_pnl.toFixed(2) + 'U';
  rpnlEl.className = 'value ' + pnlClass(today_pnl);
  document.getElementById('s-rpnl-sub').textContent = '今日 ' + closes.filter(c => c.ts_ms >= Date.now() - 86400000).length + ' 笔';

  const minV = Math.min(0, ...points);
  const maxV = Math.max(0, ...points);
  const range = maxV - minV || 1;
  const pad = 16;
  const H = 120 - pad * 2;

  function toY(v) { return pad + H - ((v - minV) / range) * H; }
  function toX(i) { return pad + (i / Math.max(points.length - 1, 1)) * (W - pad * 2); }

  // zero line
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad, toY(0)); ctx.lineTo(W - pad, toY(0)); ctx.stroke();
  ctx.setLineDash([]);

  // fill under curve
  ctx.beginPath(); ctx.moveTo(toX(0), toY(0));
  points.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(points.length - 1), toY(0));
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, 120);
  grad.addColorStop(0, 'rgba(76,175,80,0.3)');
  grad.addColorStop(1, 'rgba(76,175,80,0.0)');
  ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  points.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
  ctx.stroke();

  // last value label
  const lastX = toX(points.length - 1);
  const lastY = toY(points[points.length - 1]);
  ctx.fillStyle = '#4caf50'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
  ctx.fillText(pnlSign(cum) + cum.toFixed(2) + 'U', W - pad, lastY - 6);
}

/* ─── bot actions ─── */
async function botAction(action) {
  const r = await fetch('/api/bot/' + action, {method: 'POST'}).then(r => r.json());
  if (!r.ok) alert('失败: ' + (r.error || r.stderr || '未知错误'));
  await loadStatus();
}

async function triggerCollect() {
  const r = await fetch('/api/bot/collect', {method: 'POST'}).then(r => r.json()).catch(() => ({ok: false}));
  if (!r.ok) alert('采集触发失败 (需要后端支持)');
  else { await loadCandidates(); }
}

async function triggerCycle() {
  const r = await fetch('/api/bot/cycle', {method: 'POST'}).then(r => r.json()).catch(() => ({ok: false}));
  if (!r.ok) alert('决策触发失败 (需要后端支持)');
}

async function closePosition(symbol) {
  if (!confirm(`确认平仓 ${symbol}?`)) return;
  const r = await fetch('/api/positions/close', {method: 'POST', headers: {'Content-Type': 'application/json'},
                         body: JSON.stringify({symbol})}).then(r => r.json()).catch(() => ({ok: false}));
  if (!r.ok) alert('平仓失败: ' + (r.error || '未知错误'));
  else await loadPositions();
}

function clearLog() { document.getElementById('log-output').textContent = ''; }

/* ─── main refresh ─── */
async function loadAll() {
  await Promise.all([loadStatus(), loadPositions(), loadCandidates(), loadJournal(), loadExitStats(), loadPnlChart()]);
  document.getElementById('refresh-info').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN', {hour12: false});
  nextRefresh = Date.now() + 30000;
}

loadAll();
setInterval(loadAll, 30000);

/* ─── SSE log stream ─── */
const logEl = document.getElementById('log-output');
const evtSrc = new EventSource('/stream/logs');
evtSrc.onmessage = e => {
  logEl.textContent += e.data + '\n';
  const lines = logEl.textContent.split('\n');
  if (lines.length > 500) logEl.textContent = lines.slice(-500).join('\n');
  logEl.scrollTop = logEl.scrollHeight;
};
evtSrc.onerror = () => { logEl.textContent += '[日志连接断开]\n'; };
</script>
