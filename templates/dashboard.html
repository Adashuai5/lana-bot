<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lana-bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 13px; background: #0f0f0f; color: #d0d0d0; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
           background: #1a1a1a; border-bottom: 1px solid #333; }
  header h1 { font-size: 16px; color: #fff; }
  .badge { padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
  .badge-run { background: #1a4a1a; color: #4caf50; }
  .badge-stop { background: #4a1a1a; color: #f44336; }
  button { padding: 4px 12px; border: 1px solid #444; background: #222; color: #ccc;
           cursor: pointer; border-radius: 3px; font-size: 12px; }
  button:hover { background: #333; }
  .refresh-info { margin-left: auto; color: #555; font-size: 11px; }
  main { padding: 16px; display: grid; gap: 16px; }
  section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; overflow: hidden; }
  section h2 { padding: 8px 12px; font-size: 12px; color: #888; border-bottom: 1px solid #2a2a2a;
               text-transform: uppercase; letter-spacing: 1px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 6px 10px; text-align: left; color: #666; font-weight: normal;
       border-bottom: 1px solid #222; white-space: nowrap; }
  td { padding: 5px 10px; border-bottom: 1px solid #1e1e1e; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f1f1f; }
  .pos { color: #4caf50; }
  .neg { color: #f44336; }
  .tag { padding: 1px 5px; border-radius: 2px; font-size: 11px; }
  .tag-open { background: #1a3a1a; color: #4caf50; }
  .tag-close { background: #3a1a1a; color: #f44336; }
  .tag-decision { background: #1a2a3a; color: #64b5f6; }
  .tag-skip { background: #2a2a1a; color: #ffd54f; }
  .tag-error { background: #3a1a1a; color: #ef5350; }
  .empty { padding: 16px; color: #444; text-align: center; }
  #log-box { padding: 8px 12px; }
  #log-output { height: 280px; overflow-y: auto; white-space: pre; font-size: 11px;
                color: #7a9a7a; line-height: 1.5; }
  .stale { color: #b26200; }
</style>
</head>
<body>

<header>
  <h1>lana-bot</h1>
  <span id="status-badge" class="badge badge-stop">...</span>
  <button id="btn-start" onclick="botAction('start')">启动</button>
  <button id="btn-stop" onclick="botAction('stop')">停止</button>
  <span class="refresh-info" id="refresh-info">加载中...</span>
</header>

<main>
  <section>
    <h2>持仓</h2>
    <div id="positions-container"><p class="empty">加载中...</p></div>
  </section>

  <section>
    <h2>候选信号 <span id="candidates-ts" style="color:#555;font-weight:normal;font-size:11px;"></span></h2>
    <div id="candidates-container"><p class="empty">加载中...</p></div>
  </section>

  <section>
    <h2>决策日志（最近20条）</h2>
    <div id="journal-container"><p class="empty">加载中...</p></div>
  </section>

  <section>
    <h2>实时日志 (cycle.log)</h2>
    <div id="log-box"><pre id="log-output"></pre></div>
  </section>
</main>

<script>
function fmtTime(ms) {
  if (!ms) return '-';
  return new Date(ms).toLocaleString('zh-CN', {hour12: false});
}
function fmtAge(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'm';
}
function fmtVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  return v.toFixed(0);
}
function pnlClass(v) { return v === null ? '' : v >= 0 ? 'pos' : 'neg'; }

async function loadStatus() {
  const r = await fetch('/api/status').then(r => r.json());
  const badge = document.getElementById('status-badge');
  badge.textContent = r.running ? '运行中' : '已停止';
  badge.className = 'badge ' + (r.running ? 'badge-run' : 'badge-stop');
}

async function loadPositions() {
  const data = await fetch('/api/positions').then(r => r.json());
  const el = document.getElementById('positions-container');
  if (!data.length) { el.innerHTML = '<p class="empty">无持仓</p>'; return; }
  el.innerHTML = `<table>
    <tr><th>Symbol</th><th>入场价</th><th>Mark价</th><th>保证金</th><th>杠杆</th><th>未实现PnL</th><th>PnL%</th><th>模式</th><th>持仓时长</th></tr>
    ${data.map(p => `<tr>
      <td>${p.symbol}</td>
      <td>${p.entry_price}</td>
      <td>${p.mark_price ?? '-'}</td>
      <td>${p.size_usdt}U</td>
      <td>${p.leverage}x</td>
      <td class="${pnlClass(p.unrealized_pnl_usdt)}">${p.unrealized_pnl_usdt !== null ? p.unrealized_pnl_usdt.toFixed(2) + 'U' : '-'}</td>
      <td class="${pnlClass(p.pnl_pct)}">${p.pnl_pct !== null ? p.pnl_pct.toFixed(1) + '%' : '-'}</td>
      <td>${p.mode}</td>
      <td>${fmtAge(p.entry_ts_ms)}</td>
    </tr>`).join('')}
  </table>`;
}

async function loadCandidates() {
  const data = await fetch('/api/candidates').then(r => r.json());
  const el = document.getElementById('candidates-container');
  const tsEl = document.getElementById('candidates-ts');
  if (data.generated_at_ms) {
    const age = Date.now() - data.generated_at_ms;
    tsEl.textContent = fmtTime(data.generated_at_ms) + ' (' + fmtAge(data.generated_at_ms) + ' 前)';
    tsEl.className = age > 10 * 60 * 1000 ? 'stale' : '';
  }
  if (!data.candidates?.length) { el.innerHTML = '<p class="empty">无数据</p>'; return; }
  el.innerHTML = `<table>
    <tr><th>#</th><th>Symbol</th><th>价格</th><th>24h涨幅</th><th>成交量</th><th>OI变化1h</th><th>评分</th><th>提及</th></tr>
    ${data.candidates.map((c, i) => `<tr>
      <td style="color:#555">${i+1}</td>
      <td>${c.symbol}</td>
      <td>${c.last_price}</td>
      <td class="${c.price_change_pct >= 0 ? 'pos' : 'neg'}">${c.price_change_pct.toFixed(1)}%</td>
      <td>${fmtVol(c.quote_volume_usdt)}</td>
      <td class="${c.oi_change_1h_pct >= 0 ? 'pos' : 'neg'}">${c.oi_change_1h_pct.toFixed(1)}%</td>
      <td>${c.score.toFixed(1)}</td>
      <td>${c.square_mentions || 0}</td>
    </tr>`).join('')}
  </table>`;
}

async function loadJournal() {
  const data = await fetch('/api/journal').then(r => r.json());
  const el = document.getElementById('journal-container');
  if (!data.length) { el.innerHTML = '<p class="empty">无记录</p>'; return; }
  el.innerHTML = `<table>
    <tr><th>时间</th><th>类型</th><th>Symbol</th><th>详情</th></tr>
    ${data.map(e => {
      const tag = `<span class="tag tag-${e.event}">${e.event}</span>`;
      let detail = '';
      if (e.event === 'decision') {
        const opens = (e.open||[]).map(o=>o.symbol).join(', ');
        const closes = (e.close||[]).map(c=>c.symbol).join(', ');
        detail = [opens && '开:'+opens, closes && '关:'+closes, e.skip_reason].filter(Boolean).join(' | ').slice(0, 120);
      } else if (e.event === 'open') {
        detail = `入场 ${e.price} × ${e.leverage}x = ${e.notional_usdt}U`;
      } else if (e.event === 'close') {
        const pnl = e.net_pnl_usdt;
        detail = `<span class="${pnl >= 0 ? 'pos' : 'neg'}">${pnl?.toFixed(2)}U</span> 出场 ${e.exit_price}`;
      } else if (e.event === 'skip') {
        detail = (e.reason||'').slice(0, 80);
      } else if (e.event === 'error') {
        detail = (e.message||'').slice(0, 80);
      }
      return `<tr>
        <td style="color:#555">${fmtTime(e.ts_ms)}</td>
        <td>${tag}</td>
        <td>${e.symbol || ''}</td>
        <td style="color:#999">${detail}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

async function loadAll() {
  await Promise.all([loadStatus(), loadPositions(), loadCandidates(), loadJournal()]);
  document.getElementById('refresh-info').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN', {hour12:false});
}

async function botAction(action) {
  const r = await fetch('/api/bot/' + action, {method: 'POST'}).then(r => r.json());
  if (!r.ok) alert('失败: ' + (r.error || r.stderr || '未知错误'));
  await loadStatus();
}

// 初始加载 + 定时刷新
loadAll();
setInterval(loadAll, 30000);

// SSE 实时日志
const logEl = document.getElementById('log-output');
const evtSrc = new EventSource('/stream/logs');
evtSrc.onmessage = (e) => {
  logEl.textContent += e.data + '\n';
  // 保留最近500行
  const lines = logEl.textContent.split('\n');
  if (lines.length > 500) logEl.textContent = lines.slice(-500).join('\n');
  logEl.scrollTop = logEl.scrollHeight;
};
evtSrc.onerror = () => {
  logEl.textContent += '[日志连接断开，等待重连...]\n';
};
</script>
</body>
</html>
